# PayPaste — приклад конфігурації Nginx
#
# Розмістити: /etc/nginx/sites-available/paypaste
# Активувати:  sudo ln -s /etc/nginx/sites-available/paypaste /etc/nginx/sites-enabled/
# Перевірити:  sudo nginx -t
# Перезавантажити: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Корінь проекту
    root /var/www/paypaste;
    index index.php index.html;

    # Редирект HTTP → HTTPS (розкоментувати після налаштування SSL)
    # return 301 https://$host$request_uri;

    # --- Кодування ---
    charset utf-8;

    # --- Головна сторінка ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP-обробка ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;   # адаптувати під свою версію PHP
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;

        # Оптимізація для PHP-FPM
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # --- Заборона доступу до службових файлів ---
    # Конфігурація (містить секрети: ключі API, паролі БД, токени, JWT RSA-ключі)
    # У поєднанні з config/.htaccess утворює багаторівневий захист
    location ^~ /config/ {
        deny all;
    }

    # Файлове сховище (захист замість .htaccess)
    location ^~ /data/ {
        deny all;
    }

    # Cron-скрипти — доступні лише через CLI, не через веб
    location ^~ /cron/ {
        deny all;
    }

    # Внутрішні PHP-модулі (моделі, сервіси, контролери)
    location ^~ /includes/ {
        deny all;
    }

    # Шаблони (рендеряться через entry points, не напряму)
    location ^~ /templates/ {
        deny all;
    }

    # Агентські логи та правила
    location ^~ /.agents/ {
        deny all;
    }

    # Сховані файли (.git, .env, .htaccess, тощо)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Завантажені файли користувачів ---
    # Дозволено лише безпечні типи (jpg, png, gif, pdf, zip, txt).
    # Виконання скриптів заборонено (аналог uploads/.htaccess).
    location ^~ /uploads/ {
        autoindex off;
        # Блокуємо виконання PHP та інших скриптів
        location ~ \.(php|phtml|phps|pl|py|jsp|asp|sh|cgi|exe|bat|cmd)$ {
            deny all;
        }
    }

    # --- Завантаження файлів ---
    # Обмеження розміру завантаження (макс. 5 МБ для вкладень паст)
    client_max_body_size 5M;

    # --- Статичні файли ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # --- Безпека: заголовки ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Логування ---
    access_log /var/log/nginx/paypaste_access.log;
    error_log  /var/log/nginx/paypaste_error.log;
}

